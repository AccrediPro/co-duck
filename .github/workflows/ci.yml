name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Stub env vars for build (no actual connections needed).
          # Clerk keys must decode to a valid `<domain>.clerk.accounts.dev$` format or the
          # @clerk/clerk-react SDK throws during prerender and fails the build.
          # The publishable-key base64 below decodes to "placeholder.clerk.accounts.dev$".
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_cGxhY2Vob2xkZXIuY2xlcmsuYWNjb3VudHMuZGV2JA
          CLERK_SECRET_KEY: sk_test_stub
          STRIPE_SECRET_KEY: sk_test_stub
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_stub
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          RESEND_API_KEY: re_stub
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: stub
